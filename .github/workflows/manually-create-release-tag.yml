name: Manually create release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Release version (e.g. 0.1.0). Leave empty to use the version
          in the VERSION file.
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version=$(tr -d '[:space:]' < VERSION)
          fi
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "ERROR: '$version' is not a valid semver version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"
          echo "Releasing version $version (tag v$version)"

      - name: Verify version consistency
        run: |
          version="${{ steps.version.outputs.version }}"
          pkg_version=$(node -p "require('./package.json').version")
          file_version=$(tr -d '[:space:]' < VERSION)
          if [ "$version" != "$pkg_version" ]; then
            echo "ERROR: version '$version' does not match package.json ('$pkg_version')." >&2
            exit 1
          fi
          if [ "$version" != "$file_version" ]; then
            echo "ERROR: version '$version' does not match VERSION file ('$file_version')." >&2
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" > /dev/null; then
            echo "ERROR: tag '$tag' already exists on origin." >&2
            exit 1
          fi

      - name: Verify CHANGELOG entry and extract release notes
        run: |
          python3 - <<'EOF'
          import re, sys
          version = "${{ steps.version.outputs.version }}"
          changelog = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## |\Z)"
          match = re.search(pattern, changelog, re.DOTALL)
          if not match:
              print(
                  f"ERROR: No CHANGELOG entry found for version {version}. "
                  f"Add a '## [{version}]' section to CHANGELOG.md before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)
          notes = match.group(0).strip()
          open("release_notes.md", "w").write(notes)
          print(f"Found release notes for v{version}")
          EOF

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ steps.version.outputs.tag }}
          name:      ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
